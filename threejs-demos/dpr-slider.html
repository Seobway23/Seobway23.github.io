<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DPR vs 성능 체험 데모</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #canvas-wrapper { flex: 1; position: relative; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }

    /* 컨트롤 패널 */
    #panel {
      background: #0f172a;
      border-top: 1px solid #1e293b;
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    label { font-size: 12px; color: #94a3b8; min-width: 90px; }
    input[type=range] {
      flex: 1; min-width: 120px; max-width: 260px;
      accent-color: #7dd3fc;
    }
    .val-badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 700;
      min-width: 52px;
      text-align: center;
      color: #7dd3fc;
    }

    .info-chips { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 11px;
      color: #94a3b8;
    }
    .chip b { color: #e2e8f0; }

    /* DPR 오버레이 */
    #dpr-overlay {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,23,42,0.9);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
    }
    .dpr-hi { color: #6ee7b7; }
    .dpr-lo { color: #fca5a5; }
    .dpr-mid { color: #fbbf24; }

    /* 힌트 */
    #hint {
      position: absolute;
      bottom: 8px;
      right: 12px;
      font-size: 10px;
      color: #475569;
      pointer-events: none;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-wrapper">
    <canvas id="c"></canvas>
    <div id="dpr-overlay"><span id="dpr-label">DPR 1.0</span> — <span id="pixel-label">픽셀 계산 중...</span></div>
    <div id="hint">드래그로 회전</div>
  </div>

  <div id="panel">
    <div class="row">
      <label>DPR 배율</label>
      <input type="range" id="dpr-range" min="0.25" max="3" step="0.25" value="1" />
      <span class="val-badge" id="dpr-val">1.0×</span>
      <div class="info-chips">
        <div class="chip">내부 픽셀: <b id="chip-pixels">-</b></div>
        <div class="chip">CSS 크기: <b id="chip-css">-</b></div>
        <div class="chip">Drawing Buffer: <b id="chip-buf">-</b></div>
      </div>
    </div>
    <div class="row" style="font-size:11px; color:#475569;">
      ⚡ DPR을 올리면 내부 픽셀 수가 DPR² 배로 늘어납니다. DPR 2.0 = 4배, DPR 3.0 = 9배.
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const canvas = document.getElementById('c');
    const wrapper = document.getElementById('canvas-wrapper');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.shadowMap.enabled = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.FogExp2(0x0f172a, 0.04);

    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
    camera.position.set(0, 2, 6);

    const ambient = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    scene.add(dirLight);
    const backLight = new THREE.DirectionalLight(0x7dd3fc, 0.4);
    backLight.position.set(-5, 2, -5);
    scene.add(backLight);

    // 주 오브젝트: TorusKnot — 엣지가 선명도에 민감해서 DPR 효과가 잘 보임
    const knotGeo = new THREE.TorusKnotGeometry(1.2, 0.35, 256, 32);
    const knotMat = new THREE.MeshStandardMaterial({
      color: 0x7dd3fc, metalness: 0.6, roughness: 0.2, envMapIntensity: 1,
    });
    const knot = new THREE.Mesh(knotGeo, knotMat);
    knot.castShadow = true;
    scene.add(knot);

    // Ground
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.95 });
    const groundMesh = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
    groundMesh.rotation.x = -Math.PI / 2;
    groundMesh.position.y = -2;
    groundMesh.receiveShadow = true;
    scene.add(groundMesh);
    const grid = new THREE.GridHelper(30, 30, 0x334155, 0x1e293b);
    grid.position.y = -1.99;
    scene.add(grid);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);

    // ── DPR 상태
    let currentDpr = 1;

    function applyDpr(dpr) {
      currentDpr = dpr;
      const w = wrapper.clientWidth;
      const h = wrapper.clientHeight;
      // Three.js 공식 매뉴얼 권장: setPixelRatio 대신 setSize로 직접 drawing buffer 크기 제어
      renderer.setPixelRatio(dpr);
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      updateUI(w, h, dpr);
    }

    function updateUI(w, h, dpr) {
      const bw = Math.round(w * dpr);
      const bh = Math.round(h * dpr);
      const pixels = (bw * bh / 1_000_000).toFixed(2);

      const label = document.getElementById('dpr-label');
      label.textContent = `DPR ${dpr.toFixed(2)}`;
      label.className = dpr >= 2 ? 'dpr-lo' : dpr <= 0.75 ? 'dpr-hi' : 'dpr-mid';

      document.getElementById('pixel-label').textContent = `내부 ${bw}×${bh}`;
      document.getElementById('dpr-val').textContent = `${dpr.toFixed(2)}×`;
      document.getElementById('chip-pixels').textContent = `${pixels}MP`;
      document.getElementById('chip-css').textContent = `${w}×${h}`;
      document.getElementById('chip-buf').textContent = `${bw}×${bh}`;
    }

    function resize() {
      applyDpr(currentDpr);
    }
    resize();
    new ResizeObserver(resize).observe(wrapper);

    // ── rAF loop
    function animate() {
      requestAnimationFrame(animate);
      knot.rotation.x += 0.004;
      knot.rotation.y += 0.007;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // ── DPR 슬라이더
    const dprRange = document.getElementById('dpr-range');
    dprRange.addEventListener('input', () => {
      applyDpr(parseFloat(dprRange.value));
    });
  </script>
</body>
</html>
