<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raycaster Picking 성능 데모</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #canvas-wrapper { flex: 1; position: relative; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }

    /* 상단 모드 스위치 */
    #mode-bar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,23,42,0.9);
      border: 1px solid #334155;
      border-radius: 999px;
      padding: 5px 6px;
      display: flex;
      gap: 4px;
      font-size: 12px;
    }
    .mode-btn {
      border: none;
      border-radius: 999px;
      padding: 5px 14px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: all 0.15s;
      background: transparent;
      color: #64748b;
    }
    .mode-btn.active {
      background: #1e3a5f;
      color: #7dd3fc;
    }

    /* 우측 stats */
    #stats {
      position: absolute;
      top: 12px;
      right: 14px;
      background: rgba(15,23,42,0.88);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 11px;
      line-height: 1.9;
      min-width: 180px;
    }
    #stats .stat-row { display: flex; justify-content: space-between; gap: 16px; }
    #stats .key { color: #64748b; }
    #stats .val { color: #e2e8f0; font-weight: 700; font-variant-numeric: tabular-nums; }
    #stats .val.highlight { color: #fbbf24; }
    #stats .val.ok { color: #6ee7b7; }

    /* 하단 설명 */
    #desc-bar {
      background: #0f172a;
      border-top: 1px solid #1e293b;
      padding: 10px 20px;
      font-size: 11px;
      color: #64748b;
      flex-shrink: 0;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag-direct { color: #fca5a5; font-weight: 700; }
    .tag-raf { color: #6ee7b7; font-weight: 700; }

    /* 교차 힌트 */
    #hit-label {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,58,95,0.9);
      border: 1px solid #3b5cb8;
      border-radius: 8px;
      padding: 4px 16px;
      font-size: 12px;
      color: #7dd3fc;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="canvas-wrapper">
    <canvas id="c"></canvas>

    <div id="mode-bar">
      <button class="mode-btn active" id="btn-direct">⚡ pointermove 직접</button>
      <button class="mode-btn" id="btn-raf">✅ rAF 스로틀</button>
    </div>

    <div id="stats">
      <div class="stat-row"><span class="key">모드</span><span class="val" id="st-mode">직접 계산</span></div>
      <div class="stat-row"><span class="key">이벤트/초</span><span class="val highlight" id="st-events">0</span></div>
      <div class="stat-row"><span class="key">레이캐스트/초</span><span class="val" id="st-casts">0</span></div>
      <div class="stat-row"><span class="key">교차 대상</span><span class="val" id="st-targets">0</span></div>
      <div class="stat-row"><span class="key">현재 교차</span><span class="val ok" id="st-hit">없음</span></div>
    </div>

    <div id="hit-label" id="hit-label">오브젝트 감지!</div>
  </div>

  <div id="desc-bar">
    <span><span class="tag-direct">직접</span>: pointermove → 즉시 intersectObjects() → 이벤트 수만큼 CPU 사용</span>
    <span><span class="tag-raf">rAF</span>: pointermove → 위치 저장 → requestAnimationFrame에서 프레임당 1회만 계산</span>
    <span style="margin-left:auto; color:#334155">마우스를 빠르게 흔들어 차이를 확인하세요</span>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('c');
    const wrapper = document.getElementById('canvas-wrapper');

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f172a);

    const camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
    camera.position.set(0, 0, 9);

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 5);
    scene.add(dirLight);

    // ── 오브젝트 격자 생성 (5×4 = 20개)
    const COLS = 5, ROWS = 4;
    const objects = [];
    const defaultColors = [];
    const geo = new THREE.BoxGeometry(0.9, 0.9, 0.9);

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const hue = ((r * COLS + c) / (ROWS * COLS)) * 360;
        const color = new THREE.Color(`hsl(${hue}, 65%, 55%)`);
        defaultColors.push(color.clone());
        const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set((c - (COLS - 1) / 2) * 1.4, (r - (ROWS - 1) / 2) * 1.4, 0);
        scene.add(mesh);
        objects.push(mesh);
      }
    }

    // ── Raycaster
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2(-9999, -9999);
    let pendingPointer = null; // rAF 모드용

    // ── 모드
    let useRaf = false;
    let lastHitIndex = -1;

    // ── Stats 카운터
    let eventCount = 0, castCount = 0;
    let eventPerSec = 0, castPerSec = 0;
    let lastSecTime = performance.now();

    const elMode    = document.getElementById('st-mode');
    const elEvents  = document.getElementById('st-events');
    const elCasts   = document.getElementById('st-casts');
    const elTargets = document.getElementById('st-targets');
    const elHit     = document.getElementById('st-hit');
    const hitLabel  = document.getElementById('hit-label');

    function doRaycast(px, py) {
      pointer.x = (px / wrapper.clientWidth) * 2 - 1;
      pointer.y = -(py / wrapper.clientHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(objects);
      castCount++;

      // 이전 하이라이트 복원
      if (lastHitIndex >= 0) {
        objects[lastHitIndex].material.color.copy(defaultColors[lastHitIndex]);
        objects[lastHitIndex].material.emissive.setHex(0x000000);
      }

      if (hits.length > 0) {
        const idx = objects.indexOf(hits[0].object);
        objects[idx].material.color.setHex(0xffffff);
        objects[idx].material.emissive.setHex(0x336699);
        lastHitIndex = idx;
        elHit.textContent = `오브젝트 #${idx + 1}`;
        elHit.className = 'val ok';
        hitLabel.style.opacity = '1';
      } else {
        lastHitIndex = -1;
        elHit.textContent = '없음';
        elHit.className = 'val';
        hitLabel.style.opacity = '0';
      }
    }

    // ── pointermove 핸들러
    canvas.addEventListener('pointermove', (e) => {
      eventCount++;
      const rect = wrapper.getBoundingClientRect();
      const px = e.clientX - rect.left;
      const py = e.clientY - rect.top;

      if (!useRaf) {
        // 직접 모드: 이벤트마다 즉시 계산
        doRaycast(px, py);
      } else {
        // rAF 스로틀 모드: 위치만 저장
        pendingPointer = { px, py };
      }
    });

    // ── Resize
    function resize() {
      const w = wrapper.clientWidth, h = wrapper.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    resize();
    new ResizeObserver(resize).observe(wrapper);

    // ── rAF 루프
    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.008;

      // 오브젝트 살짝 회전
      objects.forEach((obj, i) => {
        obj.rotation.x = Math.sin(t + i * 0.3) * 0.2;
        obj.rotation.y = Math.cos(t + i * 0.2) * 0.2;
      });

      // rAF 스로틀 모드: 저장된 포인터 1회만 처리
      if (useRaf && pendingPointer) {
        doRaycast(pendingPointer.px, pendingPointer.py);
        pendingPointer = null;
      }

      renderer.render(scene, camera);

      // Stats 갱신 (1초마다)
      const now = performance.now();
      if (now - lastSecTime >= 1000) {
        eventPerSec = eventCount;
        castPerSec  = castCount;
        eventCount  = 0;
        castCount   = 0;
        lastSecTime = now;
        elEvents.textContent = eventPerSec;
        elCasts.textContent  = castPerSec;
        elTargets.textContent = objects.length;
      }
    }
    animate();

    // ── 모드 전환 버튼
    document.getElementById('btn-direct').addEventListener('click', () => {
      useRaf = false;
      pendingPointer = null;
      document.getElementById('btn-direct').classList.add('active');
      document.getElementById('btn-raf').classList.remove('active');
      elMode.textContent = '직접 계산';
    });
    document.getElementById('btn-raf').addEventListener('click', () => {
      useRaf = true;
      document.getElementById('btn-raf').classList.add('active');
      document.getElementById('btn-direct').classList.remove('active');
      elMode.textContent = 'rAF 스로틀';
    });
  </script>
</body>
</html>
