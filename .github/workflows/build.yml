name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# [404 /src/main.tsx] GitHub 저장소 Settings → Pages → Build and deployment 에서
# "Deploy from a branch" 를 쓰는 경우 소스 브랜치는 gh-pages, 폴더는 /(root) 여야 함.
# main 브랜치 /(root) 로 두면 소스 index.html(개발용 /src/main.tsx)이 그대로 올라가 404가 난다.
# Actions 가 성공한 뒤 gh-pages 에 dist 가 푸시되는지 브랜치를 확인할 것.

# Pages 배포(gh-pages 푸시) — PAT 시크릿 이름은 GITHUB_ 접두사 불가 → github.token 사용
#
# [댓글(Utterances) 저장소 ≠ 이 블로그 레포인 경우]
# - 이 워크플로는 "지금 푸시한 블로그 레포"에서만 돈다 (checkout·빌드·Pages 배포).
# - 댓글 Issue는 보통 다른 저장소에 있다. 그때 Secrets 에 넣을 값:
#   UTTERANCES_REPO = 그 Issues 가 있는 owner/repo (예: myuser/utterances-repo)
#   COMMENTS_GH_PAT  = 위 저장소의 Issues 를 읽을 수 있는 PAT (classic: public_repo 또는 repo)
# - 스크립트는 env UTTERANCES_REPO 로 넘겨 GitHub API 에서 "댓글 레포"만 조회한다. 블로그 레포와 달라도 된다.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      # 시크릿: COMMENTS_GH_PAT + UTTERANCES_REPO (블로그 레포와 댓글 레포가 같으면 UTTERANCES_REPO = 그 owner/repo)
      - name: Generate posts and fetch data
        env:
          GA_PROPERTY_ID: ${{ secrets.GA_PROPERTY_ID }}
          GA_SERVICE_ACCOUNT_KEY: ${{ secrets.GA_SERVICE_ACCOUNT_KEY }}
          COMMENTS_GH_PAT: ${{ secrets.COMMENTS_GH_PAT }}
          UTTERANCES_REPO: ${{ secrets.UTTERANCES_REPO }}
        run: npm run fetch:all:prod
        continue-on-error: true

      # Pages URL 기준 Vite base
      # - 사용자 사이트(저장소 이름이 *.github.io): https://user.github.io/ → base 는 /
      # - 프로젝트 사이트: https://user.github.io/RepoName/ → base 는 /RepoName/
      - name: Build
        env:
          VITE_BASE_PATH: ${{ endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name) }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ github.token }}
          publish_dir: ./dist
          cname: false
